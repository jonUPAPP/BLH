  sad:      { pitch: -0.25, speed: -0.20, pauseBefore: 300, pauseAfter: 500 }
};

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   DEFAULT CONFIG
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
var _cfgDefaults = {
  enabled:      false,
  autoRead:     false,
  layer:        "auto",
  moePort:      7860,
  hfSpace:      "https://skytnt-moe-tts.hf.space",
  speakerId:    0,
  lang:         "th-TH",
  maxChars:     600,
  skipMarkdown: true,
  // Phase 5
  voiceProfile: "normal",
  pitch:        1.0,
  speed:        1.0,
  volume:       1.0,
  // Phase 6
  emotionEnabled: true,
  emotion:      "normal"
};

var _cfg = (function(){
  try {
    var saved = localStorage.getItem(TTS_CFG_KEY);
    if(saved) return Object.assign({}, _cfgDefaults, JSON.parse(saved));
  } catch(e){}
  return Object.assign({}, _cfgDefaults);
})();

function _saveCfg(){
  try{ localStorage.setItem(TTS_CFG_KEY, JSON.stringify(_cfg)); }catch(e){}
  // Also persist to IndexedDB async (non-blocking)
  _idbSave("cfg", _cfg);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   IndexedDB HELPERS (Phase 5 – Voice Memory)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
var _idb = null;
function _idbOpen(cb){
  if(_idb){ if(cb) cb(_idb); return; }
  try {
    var req = indexedDB.open(TTS_IDB_NAME, 1);
    req.onupgradeneeded = function(e){
      e.target.result.createObjectStore(TTS_IDB_STORE, {keyPath:"k"});
    };
    req.onsuccess = function(e){
      _idb = e.target.result;
      if(cb) cb(_idb);
    };
    req.onerror = function(){ if(cb) cb(null); };
  } catch(e){ if(cb) cb(null); }
}
function _idbSave(k, v){
  _idbOpen(function(db){
    if(!db) return;
    try {
      var tx = db.transaction(TTS_IDB_STORE, "readwrite");
      tx.objectStore(TTS_IDB_STORE).put({k:k, v:JSON.stringify(v)});
    } catch(e){}
  });
}
function _idbLoad(k, cb){
  _idbOpen(function(db){
    if(!db){ cb(null); return; }
    try {
      var req = db.transaction(TTS_IDB_STORE, "readonly")
                  .objectStore(TTS_IDB_STORE).get(k);
      req.onsuccess = function(e){
        try{ cb(e.target.result ? JSON.parse(e.target.result.v) : null); }
        catch(ex){ cb(null); }
      };
      req.onerror = function(){ cb(null); };
    } catch(e){ cb(null); }
  });
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TEXT CLEANER
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function _clean(text){
  if(!text) return "";
  var t = text;
  if(_cfg.skipMarkdown){
    var _bt = String.fromCharCode(96);
    t = t.replace(new RegExp(_bt+_bt+_bt+"[\\s\\S]*?"+_bt+_bt+_bt,"g"),"");
    t = t.replace(new RegExp(_bt+"[^"+_bt+"]*"+_bt,"g"),"");
    t = t.replace(/\*\*([^*]+)\*\*/g,"$1");
    t = t.replace(/\*([^*]+)\*/g,"$1");
    t = t.replace(/~~([^~]+)~~/g,"$1");
    t = t.replace(/#{1,6}\s+/g,"");
    t = t.replace(/!\[.*?\]\(.*?\)/g,"รูปภาพ");
    t = t.replace(/\[([^\]]+)\]\([^)]+\)/g,"$1");
    t = t.replace(/[-•·]\s/g,"");
    t = t.replace(/\|[^|\n]+/g," ");
    t = t.replace(/_{2,}/g,"");
    t = t.replace(/_(\S[^_]*)_/g,"$1");
    t = t.replace(/https?:\/\/\S+/g,"ลิงก์");
    t = t.replace(/[→←↑↓►◄▶▸]/g,"");
    t = t.replace(/\n{2,}/g," ");
    t = t.replace(/\n/g," ");
    t = t.replace(/\s{2,}/g," ");
    t = t.replace(/[🔍🧠📚💾🕸️⚡📋✅🚧📌🔴🟠🟡🟢🔵]/gu,"");
    t = t.replace(/[^\u0000-\u007F\u0E00-\u0E7F]/gu,"");
  }
  t = t.trim();
  if(t.length > _cfg.maxChars) t = t.slice(0, _cfg.maxChars) + "…";
  return t;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PHASE 1 — THAI-ENGLISH NORMALIZER
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
var _enDict = {
  "HTML":      "เอช ที เอ็ม แอล",
  "JavaScript":"จาวา สคริปต์",
  "Python":    "ไพทอน",
  "API":       "เอ พี ไอ",
  "AI":        "เอ ไอ",
  "URL":       "ยู อาร์ แอล",
  "CSS":       "ซี เอส เอส",
  "UI":        "ยู ไอ",
  "UX":        "ยู อี เอ็กซ์",
  "BLH":       "บี แอล เอช",
  "TTS":       "ที ที เอส",
  "RAG":       "อาร์ เอ จี",
  "LLM":       "แอล แอล เอ็ม",
  "GPT":       "จี พี ที",
  "FAQ":       "เอฟ เอ คิว"
};

function _normalizeForTTS(text){
  var t = text;
  // Named replacements first
  Object.keys(_enDict).forEach(function(word){
    var re = new RegExp("\\b" + word + "\\b", "gi");
    t = t.replace(re, " " + _enDict[word] + " ");
  });
  // Remaining English words: spell letter-by-letter
  t = t.replace(/([a-zA-Z]{2,})/g, function(word){
    return " " + word.split("").join(" ") + " ";
  });
  return t;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PHASE 1 — SMART CHUNKER
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function _splitForSpeech(text){
  // Split at sentence boundaries, keeping natural pauses
  var parts = text
    .replace(/([.!?。])/g, "$1|")
    .replace(/([,，])/g, "$1|")
    .split("|")
    .map(function(s){ return s.trim(); })
    .filter(function(s){ return s.length > 0; });

  // Merge very short fragments with next chunk
  var chunks = [];
  var buf = "";
  parts.forEach(function(p){
    buf = buf ? buf + " " + p : p;
    if(buf.length >= 80 || /[.!?。]$/.test(buf)){
      chunks.push(buf);
      buf = "";
    }
  });
  if(buf) chunks.push(buf);
  return chunks.length > 0 ? chunks : [text];
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PHASE 5 — APPLY VOICE PROFILE + EMOTION
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function _getEffectivePitch(){
  var base = _cfg.pitch;
  if(!_cfg.emotionEnabled) return base;
  var emo = EMOTION_DELTAS[_cfg.emotion] || EMOTION_DELTAS.normal;
  return Math.max(0.1, Math.min(2.0, base + emo.pitch));
}
function _getEffectiveSpeed(){
  var base = _cfg.speed;
  if(!_cfg.emotionEnabled) return base;
  var emo = EMOTION_DELTAS[_cfg.emotion] || EMOTION_DELTAS.normal;
  return Math.max(0.5, Math.min(2.0, base + emo.speed));
}
function _getEmoPause(){
  if(!_cfg.emotionEnabled) return {before:0, after:0};
  var emo = EMOTION_DELTAS[_cfg.emotion] || EMOTION_DELTAS.normal;
  return {before: emo.pauseBefore||0, after: emo.pauseAfter||0};
}

function applyVoicePreset(presetKey){
  var p = VOICE_PRESETS[presetKey];
  if(!p) return;
  _cfg.voiceProfile = presetKey;
  if(presetKey !== "custom"){
    _cfg.pitch  = p.pitch;
    _cfg.speed  = p.speed;
    _cfg.volume = p.volume;
  }
  _saveCfg();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   WEB SPEECH STATE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
var _synthesis     = window.speechSynthesis || null;
var _thaiVoice     = null;
var _webSpeechReady = false;
var _speaking      = false;
var _currentAudio  = null;

/* Auto-detect voices */
function _loadVoices(){
  if(!_synthesis) return;
  var voices = _synthesis.getVoices();
  _thaiVoice = voices.find(function(v){ return v.lang.startsWith("th"); })
            || voices.find(function(v){ return v.lang.startsWith("zh"); })
            || voices[0] || null;
  _webSpeechReady = voices.length > 0;
  _updateFAB();
}
if(_synthesis){
  _synthesis.onvoiceschanged = _loadVoices;
  _loadVoices();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PHASE 1 — STABLE WEB SPEECH  (Chunked + Watchdog)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
var _watchdog = null;
function _resetWatchdog(){
  clearTimeout(_watchdog);
  _watchdog = setTimeout(function(){
    if(_synthesis && _synthesis.speaking){
      console.warn("[TTS] Watchdog: resuming stalled speech");
      _synthesis.resume();
    }
  }, 5000);
}

/* Phase 1: auto-resume on pause (Chrome/Android 1s interval) */
var _keepAliveInterval = null;
function _startKeepAlive(){
  _stopKeepAlive();
  _keepAliveInterval = setInterval(function(){
    if(!_synthesis) return;
    if(_synthesis.speaking && _synthesis.paused){
      _synthesis.resume();
    }
    if(!_synthesis.speaking && !_synthesis.pending){
      _stopKeepAlive();
    }
  }, 1000);
}
function _stopKeepAlive(){
  if(_keepAliveInterval){ clearInterval(_keepAliveInterval); _keepAliveInterval = null; }
}

/* Background tab resume (Android WebView) */
document.addEventListener("visibilitychange", function(){
  if(!document.hidden) return;
  if(_synthesis && _synthesis.speaking){
    _synthesis.resume();
  }
});

/* Speak one chunk, call back when done */
function _speakChunk(chunk, pitch, speed, volume, onDone){
  if(!_synthesis){ if(onDone) onDone(); return; }
  var utter = new SpeechSynthesisUtterance(chunk);
  utter.lang   = _cfg.lang;
  utter.rate   = speed;
  utter.pitch  = pitch;
  utter.volume = volume;
  if(_thaiVoice) utter.voice = _thaiVoice;

  utter.onstart    = _resetWatchdog;
  utter.onboundary = _resetWatchdog;
  utter.onend      = function(){ clearTimeout(_watchdog); if(onDone) onDone(); };
  utter.onerror    = function(e){
    clearTimeout(_watchdog);
    console.warn("[TTS] Chunk error:", e.error);
    if(onDone) onDone(); // continue to next chunk
  };
  _synthesis.speak(utter);
}

/* Speak array of chunks sequentially */
function _speakChunks(chunks, idx, onAllDone){
  if(_aborted){ if(onAllDone) onAllDone(); return; }
  if(idx >= chunks.length){ if(onAllDone) onAllDone(); return; }
  var pause = _getEmoPause();
  var pitch  = _getEffectivePitch();
  var speed  = _getEffectiveSpeed();
  var vol    = _cfg.volume;

  function _next(){
    var after = pause.after || 0;
    if(after > 0){
      setTimeout(function(){ _speakChunks(chunks, idx+1, onAllDone); }, after);
    } else {
      _speakChunks(chunks, idx+1, onAllDone);
    }
  }

  var before = idx === 0 ? (pause.before || 0) : 0;
  if(before > 0){
    setTimeout(function(){ _speakChunk(chunks[idx], pitch, speed, vol, _next); }, before);
  } else {
    _speakChunk(chunks[idx], pitch, speed, vol, _next);
  }
}

var _aborted = false;

function _speakWebSpeech(text, onDone){
  if(!_synthesis){ if(onDone) onDone(); return; }
  // Phase 1: Only cancel if already speaking
  if(_synthesis.speaking) _synthesis.cancel();

  _aborted = false;
  var normalized = _normalizeForTTS(text);
  var chunks     = _splitForSpeech(normalized);

  _speaking = true;
  _updateFAB();
  _startKeepAlive();

  _speakChunks(chunks, 0, function(){
    _stopKeepAlive();
    _speaking = false;
    _updateFAB();
    if(onDone) onDone();
  });
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LAYER 1: Moe TTS Local API
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
var _moeModelLoaded = false;
var _moeCheckDone   = false;
var _moeAvailable   = false;

function _checkMoeLocal(callback){
  if(_moeCheckDone){ callback(_moeAvailable); return; }
  var base = "http://localhost:" + _cfg.moePort;
  fetch(base+"/listmodels", {method:"GET", signal:AbortSignal.timeout(2000)})
    .then(function(r){ return r.json(); })
    .then(function(data){
      _moeCheckDone = true;
      _moeAvailable = Array.isArray(data) && data.length > 0;
      if(_moeAvailable && !_moeModelLoaded){
        fetch(base+"/loadmodel", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body:JSON.stringify({index:0})
        }).then(function(){ _moeModelLoaded = true; }).catch(function(){});
      }
      callback(_moeAvailable);
    })
    .catch(function(){ _moeCheckDone = true; _moeAvailable = false; callback(false); });
}

function _speakMoeLocal(text, onDone, onFail){
  var base = "http://localhost:" + _cfg.moePort;
  fetch(base+"/generation", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ text:text, speaker_id:_cfg.speakerId, speed:_getEffectiveSpeed() }),
    signal:AbortSignal.timeout(10000)
  })
  .then(function(r){ if(!r.ok) throw new Error("Moe "+r.status); return r.blob(); })
  .then(function(blob){ _playAudioBlob(URL.createObjectURL(blob), onDone); })
  .catch(onFail);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LAYER 2: HuggingFace Space API
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function _speakMoeHF(text, onDone, onFail){
  var endpoint = _cfg.hfSpace + "/run/predict";
  fetch(endpoint, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ fn_index:0, data:[text, _cfg.speakerId, _getEffectiveSpeed()] }),
    signal:AbortSignal.timeout(15000)
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if(data && data.data && data.data[1]){
      var ad = data.data[1];
      var url = typeof ad === "string" ? ad : (ad.url || ad.name);
      if(url && !url.startsWith("http")) url = _cfg.hfSpace + "/file=" + url;
      if(url){ _playAudioBlob(url, onDone); return; }
    }
    throw new Error("No audio in HF response");
  })
  .catch(onFail);
}

function _playAudioBlob(url, onDone){
  _currentAudio = new Audio(url);
  _currentAudio.volume = _cfg.volume;
  _currentAudio.playbackRate = _getEffectiveSpeed();
  _speaking = true;
  _updateFAB();
  _currentAudio.onended = function(){
    _speaking = false; URL.revokeObjectURL(url); _updateFAB(); if(onDone) onDone();
  };
  _currentAudio.onerror = function(){
    _speaking = false; _updateFAB(); if(onDone) onDone();
  };
  _currentAudio.play().catch(function(){ _speaking = false; _updateFAB(); if(onDone) onDone(); });
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PHASE 2 — SMART TTS QUEUE
   Dedup · Topic Merge · Priority · Cooldown
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
var PRIORITY = { STATUS:1, INFO:2, RESULT:3, WARNING:4, ERROR:5 };

var _smartQueue   = [];  // [{text, topic, priority}]
var _queueRunning = false;
var _cooldownTimer = null;
var _cooldownMs    = 1500; // Phase 2: debounce window

/* Detect rough topic (first 3 Thai words or first English word) */
function _detectTopic(text){
  var match = text.match(/[\u0E00-\u0E7F]+/g);
  if(match && match[0]) return match[0].slice(0,8);
  var en = text.match(/[a-zA-Z]+/);
  if(en) return en[0].toLowerCase();
  return "__default__";
}

/* Detect intent/priority from text content */
function _detectPriority(text){
  if(/ข้อผิดพลาด|error|ล้มเหลว|failed|ไม่สามารถ/i.test(text)) return PRIORITY.ERROR;
  if(/เตือน|warning|ระวัง/i.test(text))   return PRIORITY.WARNING;
  if(/พบ|ผลลัพธ์|ตอบ|result|found/i.test(text)) return PRIORITY.RESULT;
  if(/กำลัง|loading|ค้นหา|checking/i.test(text)) return PRIORITY.STATUS;
  return PRIORITY.INFO;
}

/* Phase 2: enqueue with dedup */
function _enqueueItem(item){
  // Dedup: if last item in queue has same topic → replace its text
  var last = _smartQueue[_smartQueue.length-1];
  if(last && last.topic === item.topic && !_queueRunning){
    last.text     = item.text;
    last.priority = Math.max(last.priority, item.priority);
    return;
  }
  _smartQueue.push(item);
}

/* Phase 2: interrupt current speech if new message has higher priority on same topic */
var _currentSpeech = null; // {text, topic, priority}

function _interruptIfBetter(newItem){
  if(!_currentSpeech) return false;
  if(_currentSpeech.topic !== newItem.topic) return false;
  if(newItem.priority <= _currentSpeech.priority) return false;
  // Interrupt!
  _abortCurrentSpeech();
  _smartQueue.unshift(newItem);
  _processSmartQueue();
  return true;
}

function _abortCurrentSpeech(){
  _aborted = true;
  _stopKeepAlive();
  if(_synthesis && _synthesis.speaking) _synthesis.cancel();
  if(_currentAudio){ _currentAudio.pause(); _currentAudio = null; }
  _speaking = false;
  _updateFAB();
}

function _processSmartQueue(){
  if(_smartQueue.length === 0){ _queueRunning = false; _currentSpeech = null; return; }
  _queueRunning = true;
  var item = _smartQueue.shift();
  _currentSpeech = item;
  _speakItem(item.text, function(){ _processSmartQueue(); });
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PHASE 3 — SPEECH PLANNER (Incremental / Delta)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
var _planner = {
  topic:       null,
  lastText:    "",
  spokenLen:   0,
  timestamp:   0
};

function _commonPrefixLen(a, b){
  var min = Math.min(a.length, b.length);
  for(var i = 0; i < min; i++){
    if(a[i] !== b[i]) return i;
  }
  return min;
}

/* Returns only the NEW part to speak, or full text if topics differ */
function _plannerResolve(text, topic){
  var now = Date.now();
  // Different topic → speak all
  if(_planner.topic !== topic || (now - _planner.timestamp) > 10000){
    _planner.topic     = topic;
    _planner.lastText  = text;
    _planner.spokenLen = 0;
    _planner.timestamp = now;
    return text;
  }
  // Same topic: compute delta
  var cpLen = _commonPrefixLen(_planner.lastText, text);
  _planner.lastText  = text;
  _planner.timestamp = now;

  // If we haven't started speaking the common prefix yet → speak full
  if(_planner.spokenLen <= cpLen){
    var delta = text.slice(cpLen).trim();
    if(delta.length > 3){
      _planner.spokenLen = text.length;
      return delta;
    }
  }
  // Otherwise speak full (safe fallback)
  _planner.spokenLen = text.length;
  return text;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PHASE 4 — PREDICTION LAYER (Hold + discard)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
var _pendingSpeech = null;  // {text, topic, priority, timer}
var _predHoldMs    = 300;   // wait 300ms before committing

function _predictionEnqueue(text, topic, priority){
  // If there's a pending speech for the same topic, discard old, reset timer
  if(_pendingSpeech && _pendingSpeech.topic === topic){
    clearTimeout(_pendingSpeech.timer);
    _pendingSpeech.text     = text;
    _pendingSpeech.priority = Math.max(_pendingSpeech.priority, priority);
    _pendingSpeech.timer    = setTimeout(_commitPending, _predHoldMs);
    return;
  }
  // Different topic: commit pending immediately, then schedule new
  if(_pendingSpeech){
    clearTimeout(_pendingSpeech.timer);
    _commitPendingWith(_pendingSpeech);
  }
  _pendingSpeech = {text:text, topic:topic, priority:priority,
    timer: setTimeout(_commitPending, _predHoldMs)};
}

function _commitPending(){
  if(!_pendingSpeech) return;
  _commitPendingWith(_pendingSpeech);
  _pendingSpeech = null;
}

function _commitPendingWith(item){
  var delta = _plannerResolve(item.text, item.topic);
  var finalItem = {text:delta, topic:item.topic, priority:item.priority};
  if(_interruptIfBetter(finalItem)) return;
  _enqueueItem(finalItem);
  if(!_queueRunning) _processSmartQueue();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LAYER ROUTER: speak one item through chosen layer
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function _speakItem(text, onDone){
  var layer = _cfg.layer;

  function _fallbackWS(){ _speakWebSpeech(text, onDone); }
  function _tryHF(){
    _speakMoeHF(text, onDone, function(){
      console.log("[TTS] HF failed → Web Speech");
      _fallbackWS();
    });
  }

  if(layer === "webspeech"){
    _fallbackWS();
  } else if(layer === "moe_hf"){
    _tryHF();
  } else if(layer === "moe_local"){
    _speakMoeLocal(text, onDone, function(){
      console.log("[TTS] Local Moe failed → Web Speech");
      _fallbackWS();
    });
  } else {
    // AUTO
    _checkMoeLocal(function(avail){
      if(avail){
        _speakMoeLocal(text, onDone, function(){
          console.log("[TTS] Local Moe failed → HF");
          _tryHF();
        });
      } else {
        _fallbackWS();
      }
    });
  }
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PUBLIC API
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

/* Main entry: speak with full pipeline */
function speak(rawText){
  if(!_cfg.enabled) return;
  var text = _clean(rawText);
  if(!text || text.length < 2) return;
  var topic    = _detectTopic(text);
  var priority = _detectPriority(text);
  _predictionEnqueue(text, topic, priority);
}

/* Legacy: direct queue (bypasses prediction layer, Phase 1 compat) */
function queueSpeak(text){
  if(!_cfg.enabled) return;
  var clean = _clean(text);
  if(!clean || clean.length < 2) return;
  var topic    = _detectTopic(clean);
  var priority = _detectPriority(clean);
  _enqueueItem({text:clean, topic:topic, priority:priority});
  if(!_queueRunning) _processSmartQueue();
}

function stop(){
  // Clear all queues
  _smartQueue   = [];
  _queueRunning = false;
  _currentSpeech = null;
  if(_pendingSpeech){ clearTimeout(_pendingSpeech.timer); _pendingSpeech = null; }
  _abortCurrentSpeech();
}

function toggle(){
  _cfg.enabled = !_cfg.enabled;
  _saveCfg();
  if(!_cfg.enabled) stop();
  _updateFAB();
  return _cfg.enabled;
}

function _updateFAB(){
  var fab = document.getElementById("_mml_tts_fab");
  if(!fab) return;
  var emoEmoji = (EMOTION_DELTAS[_cfg.emotion] && _cfg.emotionEnabled) ? (
    _cfg.emotion==="happy"?"😊":_cfg.emotion==="thinking"?"🤔":_cfg.emotion==="warning"?"⚠️":_cfg.emotion==="sad"?"😢":"🗣️"
  ) : "🗣️";
  if(_speaking){
    fab.textContent = "🔊";
    fab.style.background = "linear-gradient(135deg,#e91e63,#ff4081)";
    fab.style.animation  = "mml_pulse 1s infinite";
  } else if(_cfg.enabled){
    fab.textContent = emoEmoji;
    fab.style.background = "linear-gradient(135deg,#1565c0,#42a5f5)";
    fab.style.animation  = "none";
  } else {
    fab.textContent = "🔇";
    fab.style.background = "linear-gradient(135deg,#333,#555)";
    fab.style.animation  = "none";
  }
  // Show current profile in title
  var preset = VOICE_PRESETS[_cfg.voiceProfile] || VOICE_PRESETS.normal;
  fab.title = "TTS " + preset.emoji + " " + preset.name + " — แตะ: เปิด/ปิด | ดับเบิ้ลคลิก: ตั้งค่า";
}

function _cfgSet(key, value){
  _cfg[key] = value;
  _saveCfg();
  _updateFAB();
  if(key==="enabled"){
    var bg  = document.getElementById("_tts_toggle_bg");
    var dot = document.getElementById("_tts_toggle_dot");
    if(bg)  bg.style.background = value?"#b388ff":"#333";
    if(dot) dot.style.left      = value?"24px":"3px";
    if(!value) stop();
  }
  if(key==="autoRead"){
    var abg  = document.getElementById("_tts_ar_bg");
    var adot = document.getElementById("_tts_ar_dot");
    if(abg)  abg.style.background = value?"#4caf50":"#333";
    if(adot) adot.style.left      = value?"24px":"3px";
  }
}

  var voices = _synthesis ? _synthesis.getVoices() : [];
  if(voices[idx]) _thaiVoice = voices[idx];
}

/* Phase 5: switch preset */
function _setPreset(key){
  applyVoicePreset(key);
  // Update button states
  document.querySelectorAll(".tts_preset_btn").forEach(function(b){
    b.classList.remove("active");
  });
  var btns = document.querySelectorAll(".tts_preset_btn");
  var keys = ["normal","loli","oneesan","heroine","custom"];
  var idx = keys.indexOf(key);
  if(btns[idx]) btns[idx].classList.add("active");
  // Update sliders
  var pv = document.getElementById("_tts_pitch_v");
  var sv = document.getElementById("_tts_spd_v");

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   AUTO-READ HOOK (MutationObserver)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function hookBotMessages(){
  var _retries = 0;
  function _tryHook(){
    var observer = new MutationObserver(function(mutations){
      mutations.forEach(function(mut){
        mut.addedNodes.forEach(function(node){
          if(node.nodeType !== 1) return;
          var bubbles = node.querySelectorAll ? node.querySelectorAll('[class*="bot"],[class*="Bot"],[data-role="bot"]') : [];
          if(bubbles.length===0 && node.classList){
            var cl = node.className||"";
            if(cl.includes("bot")||cl.includes("Bot")||cl.includes("assistant")) bubbles=[node];
          }
          if(bubbles.length===0 && node.tagName==="DIV"){
            var txt = node.textContent;
            if(txt && txt.length>3 && !txt.includes("input") && !txt.includes("button")) bubbles=[node];
          }
          bubbles.forEach(function(b){
            if(b._tts_read) return;
            b._tts_read = true;
            if(_cfg.enabled && _cfg.autoRead){
              var text = b.textContent||b.innerText||"";
              if(text.length>3) queueSpeak(text);
            }
          });
        });
      });
    });
    var root = document.getElementById("root");
    if(root){
      observer.observe(root,{childList:true,subtree:true});
      console.log("[BLH-TTS] MutationObserver hooked ✓");
    } else if(_retries++<30){
      setTimeout(_tryHook,500);
    }
  }
  setTimeout(_tryHook,1000);
}

function patchM(){
  if(window.__MML_PATCHED_TTS) return;
  window.__MML_PATCHED_TTS = true;
  hookBotMessages();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

<!-- ═══════════════════════════════════════════════════════

<script>
(function(){
"use strict";

/* ──────────────────────────────────────────────────────────
   1. MMLStorage — IndexedDB Wrapper (replaces localStorage)
   ────────────────────────────────────────────────────────── */
var MMLStorage = (function(){
  var DB_NAME = "blh_beyond_db";
  var DB_VERSION = 2;
  var STORES = ["knowledgeBase","ragDefinitions","autoFacts","notes","profile","chatSessions","userPreferences","feedbackLogs"];
  var _db = null;

  function openDB(){
    return new Promise(function(resolve, reject){
      if(_db){ resolve(_db); return; }
      var req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = function(e){
        var db = e.target.result;
        STORES.forEach(function(s){
          if(!db.objectStoreNames.contains(s)){
            db.createObjectStore(s);
          }
        });
      };
      req.onsuccess = function(e){ _db = e.target.result; resolve(_db); };
      req.onerror = function(e){ reject(e); };
    });
  }

  function get(store, key){
    return openDB().then(function(db){
      return new Promise(function(res, rej){
        var tx = db.transaction(store, "readonly");
        var req = tx.objectStore(store).get(key);
        req.onsuccess = function(){ res(req.result); };
        req.onerror = rej;
      });
    });
  }

  function set(store, key, value){
    return openDB().then(function(db){
      return new Promise(function(res, rej){
        var tx = db.transaction(store, "readwrite");
        var req = tx.objectStore(store).put(value, key);
        req.onsuccess = function(){ res(true); };
        req.onerror = rej;
      });
    });
  }

  function getAll(store){
    return openDB().then(function(db){
      return new Promise(function(res, rej){
        var tx = db.transaction(store, "readonly");
        var items = [];
        var req = tx.objectStore(store).openCursor();
        req.onsuccess = function(e){
          var cursor = e.target.result;
          if(cursor){ items.push({key: cursor.key, value: cursor.value}); cursor.continue(); }
          else res(items);
        };
        req.onerror = rej;
      });
    });
  }

  /* Migration: copy localStorage keys into IDB (runs once) */
  function migrate(){
    var MIGRATED_KEY = "blh_idb_migrated_v2";
    if(localStorage.getItem(MIGRATED_KEY)) return;
    var LS_MAP = {
      "mml_kb":            { store:"knowledgeBase",    key:"data" },
      "mml_rag_knowledge": { store:"ragDefinitions",   key:"data" },
      "mml_rag_facts":     { store:"autoFacts",        key:"data" },
      "mml_profile":       { store:"profile",          key:"data" },
      "mml_settings":      { store:"userPreferences",  key:"settings" }
    };
    Object.keys(LS_MAP).forEach(function(lsKey){
      try{
        var raw = localStorage.getItem(lsKey);
        if(raw){
          var m = LS_MAP[lsKey];
          set(m.store, m.key, JSON.parse(raw));
        }
      }catch(e){}
    });
    localStorage.setItem(MIGRATED_KEY, "1");
    console.log("[MMLStorage] Migration from localStorage complete");
  }

  migrate();

  return { get:get, set:set, getAll:getAll, openDB:openDB };
})();

window.MMLStorage = MMLStorage;

/* ──────────────────────────────────────────────────────────
   2. PreferenceEngine — learns style from feedback
   ────────────────────────────────────────────────────────── */
var PreferenceEngine = (function(){
  var PREF_KEY = "blh_preferences_v1";

  var defaults = {
    preferredLength:  "medium",   // short | medium | detailed
    preferredDepth:   "simple",   // simple | technical | expert
    responseStyle:    "friendly", // friendly | professional | concise
    favoriteTopics:   [],
    feedbackCount:    0,
    goodCount:        0,
    badCount:         0,
    badReasons:       {},         // reason → count
    lastUpdated:      null
  };

  function load(){
    try{ return Object.assign({}, defaults, JSON.parse(localStorage.getItem(PREF_KEY)||"{}")); }catch(e){ return Object.assign({}, defaults); }
  }

  function save(prefs){
    try{ localStorage.setItem(PREF_KEY, JSON.stringify(prefs)); }catch(e){}
    MMLStorage.set("userPreferences", "prefs", prefs).catch(function(){});
  }

  function recordFeedback(sentiment, reason){
    var p = load();
    p.feedbackCount = (p.feedbackCount||0) + 1;
    p.lastUpdated   = Date.now();
    if(sentiment === "good"){
      p.goodCount = (p.goodCount||0) + 1;
    } else {
      p.badCount  = (p.badCount||0) + 1;
      if(reason){
        p.badReasons = p.badReasons || {};
        p.badReasons[reason] = (p.badReasons[reason]||0) + 1;
      }
    }
    // Auto-tune preferences after enough data
    if(p.feedbackCount >= 5){
      var reasons = p.badReasons || {};
      var tooShort = (reasons["too_short"]||0);
      var tooLong  = (reasons["too_long"] ||0);
      var tooSimple = (reasons["too_simple"]||0);
      if(tooShort > tooLong) p.preferredLength = "detailed";
      else if(tooLong > tooShort) p.preferredLength = "short";
      if(tooSimple > 0) p.preferredDepth = "technical";
    }
    save(p);
    return p;
  }

  function getSystemPromptAddition(){
    var p = load();
    if(!p.feedbackCount) return "";
    var parts = [];
    if(p.preferredLength === "detailed") parts.push("ตอบแบบละเอียดและครบถ้วน");
    else if(p.preferredLength === "short") parts.push("ตอบกระชับและสั้น");
    if(p.preferredDepth === "technical") parts.push("ใช้ภาษาเชิงเทคนิค");
    else if(p.preferredDepth === "expert") parts.push("ระดับผู้เชี่ยวชาญ");
    return parts.length ? "\n[User preference: "+parts.join(", ")+"]" : "";
  }

  function getSummary(){
    var p = load();
    if(!p.feedbackCount) return "ยังไม่มีข้อมูล (ต้องการ feedback อย่างน้อย 1 ครั้ง)";
    return "✅ "+p.goodCount+" / ❌ "+p.badCount+" | สไตล์: "+p.preferredLength+" · "+p.preferredDepth;
  }

  return { load:load, save:save, recordFeedback:recordFeedback, getSystemPromptAddition:getSystemPromptAddition, getSummary:getSummary };
})();

window.PreferenceEngine = PreferenceEngine;

/* ──────────────────────────────────────────────────────────
   3. FeedbackLogger — saves feedback to IndexedDB

var FeedbackLogger = (function(){

    entry.id        = id;

  }

  function getAll(){

  return { log:log, getAll:getAll };
})();

window.FeedbackLogger = FeedbackLogger;

/* ──────────────────────────────────────────────────────────
   4. ReflectionEngine — summarises every 15 messages
   ────────────────────────────────────────────────────────── */
var ReflectionEngine = (function(){
  var _msgCount = 0;
  var TRIGGER_EVERY = 15;
  var REFLECTION_KEY = "blh_reflections_v1";

  function tick(userMsg, botMsg){
    _msgCount++;
    if(_msgCount % TRIGGER_EVERY === 0){
      reflect(userMsg, botMsg);
    }
  }

  function reflect(lastQuery, lastResponse){
    var prefs = PreferenceEngine.load();
    var good  = prefs.goodCount || 0;
    var bad   = prefs.badCount  || 0;
    var total = good + bad;
    var satisfaction = total > 0 ? Math.round((good/total)*100) : null;

    var card = {
      type:           "reflection",
      timestamp:      new Date().toISOString(),
      msgCount:       _msgCount,
      satisfaction:   satisfaction,
      goodCount:      good,
      badCount:       bad,
      preferredStyle: prefs.preferredLength + " · " + prefs.preferredDepth
    };

    // Save
    try{
      var existing = JSON.parse(localStorage.getItem(REFLECTION_KEY)||"[]");
      existing.push(card);
      if(existing.length > 20) existing = existing.slice(-20);
      localStorage.setItem(REFLECTION_KEY, JSON.stringify(existing));
    }catch(e){}

    // Show reflection card in chat
    showReflectionCard(card);
  }

  function showReflectionCard(card){
    setTimeout(function(){
      var root = document.getElementById("root");
      if(!root) return;

      var pct = card.satisfaction !== null ? card.satisfaction+"%" : "N/A";
      var html = '<div style="background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(179,136,255,0.3);border-radius:18px;padding:18px 22px;margin-top:8px;max-width:520px;animation:msg-enter 0.4s ease">'
        + '<div style="display:flex;align-items:center;gap:10;margin-bottom:12px">'
        +   '<span style="font-size:20px">🔮</span>'
        +   '<span style="font-weight:800;font-size:0.95rem;color:var(--accent-color)">Reflection — ทุก '+TRIGGER_EVERY+' ข้อความ</span>'
        + '</div>'
        + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'
        +   '<div style="background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.2);border-radius:10px;padding:10px;text-align:center">'
        +     '<div style="font-size:1.4rem;font-weight:800;color:#00e676">'+card.goodCount+'</div>'
        +     '<div style="font-size:11px;color:var(--text-dim)">ตอบถูกใจ 👍</div>'
        +   '</div>'
        +   '<div style="background:rgba(255,82,82,0.08);border:1px solid rgba(255,82,82,0.2);border-radius:10px;padding:10px;text-align:center">'
        +     '<div style="font-size:1.4rem;font-weight:800;color:#ff5252">'+card.badCount+'</div>'
        +     '<div style="font-size:11px;color:var(--text-dim)">ตอบไม่ถูกใจ 👎</div>'
        +   '</div>'
        + '</div>'
        + '<div style="font-size:13px;color:var(--text-dim)">'
        +   '📊 ความพึงพอใจ: <strong style="color:var(--accent-color)">'+pct+'</strong> &nbsp;|&nbsp; '
        +   '🎨 สไตล์ที่เรียนรู้: <strong style="color:var(--accent-color)">'+card.preferredStyle+'</strong>'
        + '</div>'
        + '</div>';

      // Inject directly into the message list
      var msgList = root.querySelector("[class*=msg-enter]");
      if(msgList && msgList.parentElement){
        var wrapper = document.createElement("div");
        wrapper.className = "msg-enter";
        wrapper.style.cssText = "align-self:center;width:100%;max-width:900px;margin:8px 0";
        wrapper.innerHTML = html;
        msgList.parentElement.appendChild(wrapper);
        msgList.parentElement.scrollTop = msgList.parentElement.scrollHeight;
      }
    }, 600);
  }

  return { tick:tick, reflect:reflect };
})();

window.ReflectionEngine = ReflectionEngine;

/* ──────────────────────────────────────────────────────────
   5. Feedback UI — MutationObserver patches bot bubbles
   ────────────────────────────────────────────────────────── */
(function(){

  var REASONS = [
    { id:"wrong_answer",   label:"❌ คำตอบผิด" },
    { id:"off_topic",      label:"🎯 ไม่ตรงคำถาม" },
    { id:"too_short",      label:"📏 สั้นเกินไป" },
    { id:"too_long",       label:"📜 ยาวเกินไป" },
    { id:"too_simple",     label:"🧩 ง่ายเกินไป" },
    { id:"other",          label:"🤷 อื่นๆ" }
  ];

  /* Track query/response pairs for logging */
  var _lastUserMsg  = "";
  var _msgCounter   = 0;

  /* Hook into the existing Se (onSend) to track user messages */
  /* We do this by observing new user bubbles */

  function injectFeedbackBar(botBubble){
    if(botBubble.dataset.blhFeedback) return;
    botBubble.dataset.blhFeedback = "1";

    /* Identify the content of this bot message */
    var contentEl = botBubble.querySelector("[class*=markdown]") || botBubble.querySelector("div[style*='14px']") || botBubble.firstElementChild;
    var botContent = contentEl ? (contentEl.innerText || contentEl.textContent || "").slice(0, 300) : "";

    /* Find nearest preceding user bubble to get the query */
    var query = _lastUserMsg || "(unknown)";

    /* Build feedback bar */
    var bar = document.createElement("div");
    bar.setAttribute("data-blh-feedback-bar","1");
    bar.style.cssText = "display:flex;align-items:center;gap:6px;margin-top:6px;padding:0 4px;opacity:0;transition:opacity 0.2s";

    var state = { voted: null, reasonShown: false };

    function makeBtn(emoji, label, active, onClick){
      var b = document.createElement("button");
      b.innerHTML = emoji;
      b.title = label;
      b.style.cssText = "background:"+(active?"rgba(179,136,255,0.2)":"rgba(255,255,255,0.04)")+";border:1px solid "+(active?"var(--accent-color)":"rgba(255,255,255,0.1)")+";border-radius:20px;padding:3px 10px;font-size:13px;cursor:pointer;color:var(--text-dim);transition:0.2s;line-height:1.4";
      b.addEventListener("mouseenter",function(){ if(!state.voted) b.style.background="rgba(179,136,255,0.15)"; });
      b.addEventListener("mouseleave",function(){ if(!state.voted) b.style.background="rgba(255,255,255,0.04)"; });
      b.addEventListener("click", onClick);
      return b;
    }

    /* --- 👍 Good --- */
    var thumbUp = makeBtn("👍","ถูกใจ", false, function(){
      if(state.voted) return;
      state.voted = "good";
      thumbUp.style.background  = "rgba(0,230,118,0.2)";
      thumbUp.style.borderColor = "#00e676";
      thumbDown.style.opacity   = "0.3";
      reasonPanel.style.display = "none";

      var entry = { query: query, response: botContent, feedback: "good" };
      FeedbackLogger.log(entry);
      PreferenceEngine.recordFeedback("good", null);
      ReflectionEngine.tick(query, botContent);

      showToast("✅ ขอบคุณ! บันทึก feedback แล้ว");
    });

    /* --- 👎 Bad --- */
    var reasonPanel = document.createElement("div");
    reasonPanel.style.cssText = "display:none;flex-wrap:wrap;gap:6px;margin-top:6px;padding:8px 10px;background:rgba(255,82,82,0.06);border:1px solid rgba(255,82,82,0.2);border-radius:12px;animation:msg-enter 0.25s ease";

    var thumbDown = makeBtn("👎","ไม่ถูกใจ", false, function(){
      if(state.voted) return;
      state.reasonShown = !state.reasonShown;
      reasonPanel.style.display = state.reasonShown ? "flex" : "none";
    });

    /* Reason buttons */
    REASONS.forEach(function(r){
      var rb = document.createElement("button");
      rb.innerHTML = r.label;
      rb.style.cssText = "background:rgba(255,255,255,0.04);border:1px solid rgba(255,82,82,0.2);border-radius:14px;padding:4px 12px;font-size:12px;cursor:pointer;color:var(--text-dim);transition:0.2s";
      rb.addEventListener("mouseenter",function(){ rb.style.background="rgba(255,82,82,0.15)"; rb.style.color="#ff5252"; });
      rb.addEventListener("mouseleave",function(){ rb.style.background="rgba(255,255,255,0.04)"; rb.style.color="var(--text-dim)"; });
      rb.addEventListener("click",function(){
        state.voted = "bad";
        thumbDown.style.background  = "rgba(255,82,82,0.2)";
        thumbDown.style.borderColor = "#ff5252";
        thumbUp.style.opacity       = "0.3";
        reasonPanel.style.display   = "none";

        var entry = { query: query, response: botContent, feedback: "negative", reason: r.id };
        FeedbackLogger.log(entry);
        PreferenceEngine.recordFeedback("bad", r.id);
        ReflectionEngine.tick(query, botContent);

        /* Level 3: Self-correction for "wrong_answer" */
        if(r.id === "wrong_answer" || r.id === "off_topic"){
          triggerSelfCorrection(query, botContent);
        }

        showToast("📝 บันทึกแล้ว: "+r.label);
      });
      reasonPanel.appendChild(rb);
    });

    bar.appendChild(thumbUp);
    bar.appendChild(thumbDown);

    botBubble.appendChild(bar);
    botBubble.appendChild(reasonPanel);

    /* Show bar on hover */
    botBubble.addEventListener("mouseenter",function(){ bar.style.opacity="1"; });
    botBubble.addEventListener("mouseleave",function(){ if(!state.voted) bar.style.opacity="0"; else bar.style.opacity="1"; });
  }

  /* Self-correction: re-generate via existing AI infra */
  function triggerSelfCorrection(query, badResponse){
    if(!window.__BLH_APP_SEND__) return;
    setTimeout(function(){
      showToast("🔄 กำลังสร้างคำตอบใหม่...", 2500);
      window.__BLH_APP_SEND__("/ถาม กรุณาตอบคำถามนี้ใหม่อีกครั้ง (คำตอบก่อนหน้าไม่ถูกต้อง): " + query);
    }, 1200);
  }

  /* Toast notification */
  function showToast(msg, dur){
    var t = document.getElementById("blh-toast");
    if(!t){
      t = document.createElement("div");
      t.id = "blh-toast";
      t.style.cssText = "position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:#1e1e2e;border:1px solid var(--accent-color);border-radius:24px;padding:10px 20px;font-size:13px;font-weight:600;color:var(--accent-color);z-index:9999;pointer-events:none;opacity:0;transition:all 0.3s cubic-bezier(0.18,0.89,0.32,1.28);box-shadow:0 8px 30px rgba(0,0,0,0.5)";
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.opacity = "1";
    t.style.transform = "translateX(-50%) translateY(0)";
    clearTimeout(t._timeout);
    t._timeout = setTimeout(function(){
      t.style.opacity = "0";
      t.style.transform = "translateX(-50%) translateY(10px)";
    }, dur || 2200);
  }

  /* MutationObserver: watch for new bot message bubbles */
  function observeChat(){
    var root = document.getElementById("root");
    if(!root){ setTimeout(observeChat, 500); return; }

    var observer = new MutationObserver(function(mutations){
      mutations.forEach(function(m){
        m.addedNodes.forEach(function(node){
          if(node.nodeType !== 1) return;

          /* Track user messages */
          var userBubbles = node.querySelectorAll ? node.querySelectorAll("[style*='#7c4dff'],[style*='651fff']") : [];
          if(userBubbles.length === 0 && node.style && (node.style.background||"").includes("7c4dff")) userBubbles = [node];
          userBubbles.forEach(function(ub){
            var txt = ub.innerText || ub.textContent || "";
            if(txt.trim()) _lastUserMsg = txt.trim().slice(0, 200);
          });

          /* Patch bot bubbles */
          var botContainers = node.querySelectorAll ? node.querySelectorAll("[class*='msg-enter']") : [];
          if(botContainers.length === 0 && node.classList && node.classList.contains && node.classList.contains("msg-enter")) botContainers = [node];

          botContainers.forEach(function(bc){
            /* Only process bot (non-user) messages */
            if(bc.style && bc.style.alignSelf === "flex-end") return;
            /* Find the actual bubble div inside the container */
            var bubble = bc.querySelector("[class*='markdown-body']");
            if(bubble) {
              injectFeedbackBar(bubble.closest("[class*='msg-enter']") || bubble.parentElement || bc);
            }
          });

          /* Direct bot bubble */
          if(node.dataset && !node.dataset.blhFeedback){
            var md = node.querySelector ? node.querySelector("[class*='markdown-body']") : null;
            if(md){
              _msgCounter++;
              injectFeedbackBar(node);
            }
          }
        });
      });
    });

    observer.observe(root, { childList: true, subtree: true });
    console.log("[BLH Phase 0.2] FeedbackSystem observer active");
  }

  /* Expose send hook for self-correction */
  /* We patch window to intercept after React is ready */
  function patchSendHook(){
    /* The React app sends via the Se callback; we can't patch it directly.
       Instead expose a global that triggers a synthetic input+enter */
    window.__BLH_APP_SEND__ = function(text){
      var input = document.querySelector("input[type=text]");
      if(!input) return;
      var nativeInputValueSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, "value").set;
      nativeInputValueSetter.call(input, text);
      input.dispatchEvent(new Event("input", {bubbles:true}));
      setTimeout(function(){
        input.dispatchEvent(new KeyboardEvent("keydown", {key:"Enter",bubbles:true}));
      }, 100);
    };
  }

  /* Init */
  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", function(){ observeChat(); patchSendHook(); });
  } else {
    setTimeout(function(){ observeChat(); patchSendHook(); }, 200);
  }

  /* Expose /preference command */
  document.addEventListener("keydown", function(e){
    if(e.key !== "Enter") return;
    var input = document.querySelector("input[type=text]");
    if(!input) return;
    var val = (input.value||"").trim();
    if(val === "/preference" || val === "/learning"){
      setTimeout(function(){
        var summary = PreferenceEngine.getSummary();
        var prefs   = PreferenceEngine.load();
        var msg = "🧠 **User Preference Learning**\n\n"
          + "**Feedback สะสม:** "+prefs.feedbackCount+" ครั้ง\n"
          + "**สรุป:** "+summary+"\n\n"
          + "**ค่าที่เรียนรู้:**\n"
          + "- ความยาว: `"+prefs.preferredLength+"`\n"
          + "- ความลึก: `"+prefs.preferredDepth+"`\n"
          + "- สไตล์: `"+prefs.responseStyle+"`";
        /* Inject as bot message */
        var root = document.getElementById("root");
        if(root){
          var msgList = root.querySelector("[class*=msg-enter]");
          if(msgList && msgList.parentElement){
            var wrapper = document.createElement("div");
            wrapper.className = "msg-enter";
            wrapper.style.cssText = "align-self:flex-start;display:flex;flex-direction:column;max-width:85%";
            var bubble = document.createElement("div");
            bubble.className = "markdown-body";
            bubble.style.cssText = "padding:14px 20px;font-size:15.5px;line-height:1.65;background:var(--bot-bubble);color:var(--text-main);border:1px solid var(--border-ui);border-radius:var(--radius-lg) var(--radius-lg) var(--radius-lg) 4px;word-break:break-word";
            // Convert markdown-ish to html
            bubble.innerHTML = msg.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/`(.+?)`/g,'<code style="background:rgba(179,136,255,0.15);color:var(--accent-color);padding:1px 6px;border-radius:5px">$1</code>').replace(/\n/g,"<br/>");
            wrapper.appendChild(bubble);
            msgList.parentElement.appendChild(wrapper);
            msgList.parentElement.scrollTop = msgList.parentElement.scrollHeight;
          }
        }
      }, 50);
    }
  });

  console.log("[BLH Phase 0.2] Learning-First Upgrade loaded ✓");
  console.log("[BLH Phase 0.2] Commands: /preference or /learning to view stats");

})();

})(); // close outer IIFE

</script>

<script>
/*
 ██████╗ ██╗      ██╗  ██╗    ██████╗ ██╗  ██╗ █████╗ ███████╗███████╗     ██████╗
 ██╔══██╗██║      ██║  ██║    ██╔══██╗██║  ██║██╔══██╗██╔════╝██╔════╝    ██╔═████╗
 ██████╔╝██║      ███████║    ██████╔╝███████║███████║███████╗█████╗      ██║██╔██║
 ██╔══██╗██║      ██╔══██║    ██╔═══╝ ██╔══██║██╔══██║╚════██║██╔══╝     ████╔╝██║
 ██████╔╝███████╗ ██║  ██║    ██║     ██║  ██║██║  ██║███████║███████╗   ╚██████╔╝
 ╚═════╝ ╚══════╝ ╚═╝  ╚═╝    ╚═╝     ╚═╝  ╚═╝╚═╝  ╚═╝╚══════╝╚══════╝    ╚═════╝

  BLH V0.4 — Phase 03: Central Brain Core Architecture
  ============================================================
  ✅ BrainCore — Single hub routing all engines
  ✅ MemoryV5 — Unified IndexedDB schema
  ✅ Intent Router v2 — 8-class routing
  ✅ Working Memory / Evidence Pool (shared context)
  ✅ Feedback → Weight Update → Memory/Search Ranking
  ✅ Reflection → Semantic Memory → Knowledge Graph
  ✅ KG Auto-Update on every memory add
  ✅ Unified search layer (no duplicate queries)
  ✅ /braincore /memv5 /pool /reflect commands
*/
(function(){"use strict";

/* ============================================================
   1. MEMORYV5 — Unified IndexedDB Database
   ============================================================ */
var MemoryV5 = (function(){
  var DB_NAME = "BLH_MemoryV5";
  var DB_VERSION = 1;
  var STORES = ["episodic","semantic","notes","reflections","feedback","embeddings","graph"];
  var _db = null;
  var _ready = false;
  var _queue = [];
  var _cache = {episodic:[],semantic:[],notes:[],feedback:[],reflections:[]};
  var _weights = {}; // item id -> weight (feedback learning)

  function _open(){
    if(_db) return Promise.resolve(_db);
    return new Promise(function(res,rej){
      var req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = function(e){
        var db = e.target.result;
        STORES.forEach(function(s){
          if(!db.objectStoreNames.contains(s)){
            var store = db.createObjectStore(s,{keyPath:"id",autoIncrement:true});
            if(s==="episodic"||s==="semantic"){
              store.createIndex("timestamp","timestamp",{unique:false});
              store.createIndex("importance","importance",{unique:false});
            }
          }
        });
      };
      req.onsuccess = function(e){_db=e.target.result;_ready=true;res(_db);};
      req.onerror = function(){rej(req.error);};
    });
  }

  function _put(store, obj){
    return _open().then(function(db){
      return new Promise(function(res,rej){
        var tx = db.transaction(store,"readwrite");
        var req = tx.objectStore(store).put(obj);
        req.onsuccess = function(){res(req.result);};
        req.onerror = function(){rej(req.error);};
      });
    });
  }

  function _getAll(store){
    return _open().then(function(db){
      return new Promise(function(res,rej){
        var tx = db.transaction(store,"readonly");
        var req = tx.objectStore(store).getAll();
        req.onsuccess = function(){res(req.result||[]);};
        req.onerror = function(){rej(req.error);};
      });
    });
  }

  function _tok(t){
    return (t||"").toLowerCase().replace(/[^\u0E00-\u0E7Fa-z0-9\s]/g," ").split(/\s+/).filter(function(w){return w.length>1;});
  }

  function _cos(a,b){
    var dot=0,na=0,nb=0;
    var keys={};
    Object.keys(a).concat(Object.keys(b)).forEach(function(k){keys[k]=1;});
    Object.keys(keys).forEach(function(k){
      var av=a[k]||0,bv=b[k]||0;
      dot+=av*bv;na+=av*av;nb+=bv*bv;
    });
    if(!na||!nb)return 0;
    return dot/(Math.sqrt(na)*Math.sqrt(nb));
  }

  function _freq(tokens){
    var f={};tokens.forEach(function(t){f[t]=(f[t]||0)+1;});return f;
  }

  function _decay(ts,imp){
    var hrs=(Date.now()-ts)/3600000;
    return imp*Math.exp(-0.005*hrs);
  }

  // Add episodic memory + auto-update KG
  function addEpisodic(query,answer,meta){
    var item = {
      type:"episodic",
      query:query||"",
      content:answer||"",
      timestamp:Date.now(),
      importance:(meta&&meta.importance)||0.7,
      source:(meta&&meta.source)||"chat",
      accessCount:0,
      weight:1.0
    };
    // Auto-extract KG triples
    _autoUpdateKG(query+" "+answer);
    _put("episodic",item).then(function(id){
      item.id=id;
      _cache.episodic.unshift(item);
      if(_cache.episodic.length>200)_cache.episodic=_cache.episodic.slice(0,200);
    }).catch(function(){
      // fallback: store in cache only
      _cache.episodic.unshift(item);
    });
  }

  function addSemantic(content,meta){
    var item = {
      type:"semantic",
      content:content||"",
      timestamp:Date.now(),
      importance:(meta&&meta.importance)||0.75,
      source:(meta&&meta.source)||"learn",
      key:(meta&&meta.key)||null,
      value:(meta&&meta.value)||null,
      accessCount:0,
      weight:1.0
    };
    _autoUpdateKG(content);
    _put("semantic",item).then(function(id){
      item.id=id;
      _cache.semantic.unshift(item);
      if(_cache.semantic.length>200)_cache.semantic=_cache.semantic.slice(0,200);
    }).catch(function(){
      _cache.semantic.unshift(item);
    });
  }

  function addNote(content){
    var item = {
      content:content,
      timestamp:Date.now(),
      weight:1.0
    };
    _put("notes",item).then(function(id){
      item.id=id;
      _cache.notes.unshift(item);
    }).catch(function(){
      _cache.notes.unshift(item);
    });
  }

  // ---- Unified Search (single pass, no duplicate queries) ----
  function search(query,opts){
    opts = opts||{};
    var topK = opts.topK||8;
    var threshold = opts.threshold||0.02;
    var qToks = _tok(query);
    var qFreq = _freq(qToks);

    // Build candidate list from all sources
    var candidates = [];

    // 1. Episodic
    _cache.episodic.forEach(function(m){
      var mFreq = _freq(_tok(m.query+" "+m.content));
      var score = _cos(qFreq,mFreq);
      if(score>=threshold){
        var decayed = _decay(m.timestamp, m.importance);
        var w = (m.weight||1.0);
        candidates.push({id:m.id||Math.random(),content:m.content,query:m.query,score:score*decayed*w,type:"episodic",source:m.source});
      }
    });

    // 2. Semantic
    _cache.semantic.forEach(function(m){
      var mFreq = _freq(_tok(m.content));
      var score = _cos(qFreq,mFreq);
      if(score>=threshold){
        var decayed = _decay(m.timestamp, m.importance);
        var w = (m.weight||1.0);
        candidates.push({id:m.id||Math.random(),content:m.content,score:score*decayed*w,type:"semantic",source:m.source});
      }
    });

    // 3. Notes
    _cache.notes.forEach(function(m){
      var mFreq = _freq(_tok(m.content));
      var score = _cos(qFreq,mFreq);
      if(score>=threshold){
        candidates.push({id:m.id||Math.random(),content:m.content,score:score*(m.weight||1.0),type:"note"});
      }
    });

    // 4. Legacy MemoryV4 (non-destructive bridge)
    if(window.MemoryEngineV4){
      try{
        var v4 = window.MemoryEngineV4.retrieve(query,{topK:4,threshold:threshold});
        v4.forEach(function(r){
          candidates.push({id:"v4_"+Math.random(),content:r.content||r.text||"",score:(r.score||0.1),type:r.type||"legacy"});
        });
      }catch(e){}
    }

    // 5. Knowledge Graph semantic search
    if(window.KnowledgeGraph){
      try{
        var kgHits = window.KnowledgeGraph.search(query,4);
        kgHits.forEach(function(h){
          candidates.push({id:"kg_"+Math.random(),content:h,score:0.35,type:"kg"});
        });
      }catch(e){}
    }

    // Deduplicate, sort, slice
    var seen = {};
    var results = [];
    candidates.sort(function(a,b){return b.score-a.score;});
    candidates.forEach(function(c){
      var key = (c.content||"").substring(0,40);
      if(!seen[key]&&c.content){
        seen[key]=1;
        results.push(c);
      }
    });

    // Update access counts
    results.slice(0,topK).forEach(function(r){
      if(r.id&&!String(r.id).startsWith("v4_")&&!String(r.id).startsWith("kg_")){
        _updateWeight(r.id,r.type,0.02); // small boost for accessed
      }
    });

    return results.slice(0,topK);
  }

  // Feedback: +/- weight for a memory item
  function applyFeedback(itemId, itemType, delta){
    var arr = itemType==="episodic"?_cache.episodic:itemType==="semantic"?_cache.semantic:_cache.notes;
    arr.forEach(function(m){
      if(m.id===itemId){
        m.weight = Math.max(0.1, Math.min(3.0, (m.weight||1.0)+delta));
        _put(itemType,m).catch(function(){});
      }
    });
  }

  function _updateWeight(id,type,delta){
    applyFeedback(id,type,delta);
  }

  // Save reflection to semantic memory + KG
  function addReflection(content, originalQuery){
    var item = {content:content,originalQuery:originalQuery||"",timestamp:Date.now()};
    _put("reflections",item).then(function(id){
      item.id=id;
      _cache.reflections.unshift(item);
      if(_cache.reflections.length>50)_cache.reflections=_cache.reflections.slice(0,50);
    }).catch(function(){
      _cache.reflections.unshift(item);
    });
    // Also add to semantic
    addSemantic(content,{source:"reflection",importance:0.8});
    // KG update
    _autoUpdateKG(content);
  }

  // Auto-update Knowledge Graph when content is added
  function _autoUpdateKG(text){
    if(!text||!window.KnowledgeGraph)return;
    try{
      var triple = window.KnowledgeGraph.extractTriple(text);
      if(triple){
        window.KnowledgeGraph.addEdge(triple.subject,triple.relation,triple.object);
        if(window.RuleEngine)window.RuleEngine.expandTransitivity();
      }
    }catch(e){}
  }

  // Load from IndexedDB into cache on init
  function init(){
    Promise.all([
      _getAll("episodic"),
      _getAll("semantic"),
      _getAll("notes"),
      _getAll("reflections")
    ]).then(function(results){
      _cache.episodic = (results[0]||[]).sort(function(a,b){return b.timestamp-a.timestamp;});
      _cache.semantic = (results[1]||[]).sort(function(a,b){return b.timestamp-a.timestamp;});
      _cache.notes = (results[2]||[]).sort(function(a,b){return b.timestamp-a.timestamp;});
      _cache.reflections = (results[3]||[]).sort(function(a,b){return b.timestamp-a.timestamp;});
      console.log("[MemoryV5] Loaded: ep="+_cache.episodic.length+" sem="+_cache.semantic.length+" notes="+_cache.notes.length);
    }).catch(function(){
      // Fallback: bridge from MemoryV4 on first load
      _bridgeFromV4();
    });
  }

  function _bridgeFromV4(){
    if(!window.MemoryEngineV4)return;
    try{
      var st=window.MemoryEngineV4.stats();
      console.log("[MemoryV5] Bridging from V4: "+JSON.stringify(st));
    }catch(e){}
  }

  function stats(){
    return{
      episodic:_cache.episodic.length,
      semantic:_cache.semantic.length,
      notes:_cache.notes.length,
      reflections:_cache.reflections.length,
      dbReady:_ready
    };
  }

  function getPool(){return _cache;}

  init();

  return{
    addEpisodic:addEpisodic,
    addSemantic:addSemantic,
    addNote:addNote,
    addReflection:addReflection,
    search:search,
    applyFeedback:applyFeedback,
    stats:stats,
    getPool:getPool
  };
})();

window.MemoryV5 = MemoryV5;
console.log("[BLH V0.4] MemoryV5 loaded — Unified IndexedDB + Auto-KG sync");


/* ============================================================
   2. WORKING MEMORY (Evidence Pool v2)
      Shared context window — all engines read from here
   ============================================================ */
var WorkingMemory = (function(){
  var _pool = [];
  var _maxSize = 30;

  function update(results, query){
    if(!results||!results.length)return;
    var now = Date.now();
    results.forEach(function(r){
      // Don't add duplicates
      var dup = _pool.some(function(p){return p.content&&r.content&&p.content.substring(0,40)===r.content.substring(0,40);});
      if(!dup&&r.content){
        _pool.unshift({content:r.content,score:r.score||0.5,type:r.type||"?",query:query,ts:now});
      }
    });
    _pool.sort(function(a,b){return b.score-a.score;});
    if(_pool.length>_maxSize)_pool=_pool.slice(0,_maxSize);
  }

  function get(limit){
    return _pool.slice(0,limit||10);
  }

  function clear(){_pool=[];}

  function toContext(limit){
    return get(limit||5).map(function(p){return p.content;}).join("\n\n");
  }

  return{update:update,get:get,clear:clear,toContext:toContext};
})();

window.WorkingMemory = WorkingMemory;


/* ============================================================
   3. INTENT ROUTER v2 — 8-class routing
   ============================================================ */
var IntentRouterV2 = (function(){
  var PATTERNS = {
    math:        [/[0-9+\-*\/^().\s]{3,}[+\-*\/^][0-9+\-*\/^().\s]{1,}/,/คำนวณ|หาร|คูณ|บวก|ลบ|เปอร์เซ็น/],
    datetime:    [/กี่โมง|วันนี้|วันที่|เวลา|ปีนี้|เดือน/],
    define:      [/คือ|หมายถึง|ย่อมาจาก|ความหมาย|คืออะไร|คำนิยาม/],
    personal:    [/ชื่อ|ผม|ฉัน|หนู|โน้ต|จำ|ความจำ|บันทึก/],
    plan:        [/วางแผน|ขั้นตอน|วิธีทำ|แผนการ|todo|plan|step/i],
    reason:      [/เพราะ|ทำไม|อธิบาย|สาเหตุ|เหตุผล|why|because/i],
    knowledge:   [/ค้นหา|บอก|อธิบาย|รู้|ความรู้|search|tell me/i],
    command:     [/^\//, /เปิด|ปิด|ตั้งค่า|ล้าง|รีเซ็ต|export|import/]
  };

  function classify(query){
    if(!query)return"knowledge";
    var q = query.toLowerCase().trim();
    for(var intent in PATTERNS){
      var pats = PATTERNS[intent];
      for(var i=0;i<pats.length;i++){
        if(pats[i].test(q))return intent;
      }
    }
    return"knowledge";
  }

  return{classify:classify};
})();

window.IntentRouterV2 = IntentRouterV2;
console.log("[BLH V0.4] IntentRouterV2 loaded — 8-class routing");


/* ============================================================
   4. FEEDBACK LEARNING ENGINE
      Feedback → Weight Update → Memory/Search Ranking
   ============================================================ */
var FeedbackEngine = (function(){
  var _history = []; // {query, answer, score, ts}

  function record(query, answer, score){
    var entry = {query:query,answer:answer,score:score,ts:Date.now()};
    _history.unshift(entry);
    if(_history.length>100)_history=_history.slice(0,100);
    // Propagate to MemoryV5 working pool
    _applyToMemory(query,answer,score);
    // Propagate to legacy MemoryV4 if available
    if(window.MemoryEngineV4&&window.MemoryEngineV4.addEpisodic){
      window.MemoryEngineV4.addEpisodic(query,answer,{importance:score>0?0.8:0.3,source:"feedback"});
    }
  }

  function _applyToMemory(query, answer, score){
    // Find matching items in WorkingMemory pool and adjust weights
    var pool = window.WorkingMemory?window.WorkingMemory.get(10):[];
    var delta = score>0?0.1:-0.1;
    pool.forEach(function(item){
      if(item.type&&item.type!=="kg"){
        // Reflect positive/negative result back to memory weights
        window.MemoryV5&&window.MemoryV5.applyFeedback&&
          window.MemoryV5.applyFeedback(null,item.type,delta);
      }
    });
  }

  function thumbsUp(query,answer){record(query,answer,1);}
  function thumbsDown(query,answer){record(query,answer,-1);}

  function stats(){
    var pos=_history.filter(function(e){return e.score>0;}).length;
    var neg=_history.filter(function(e){return e.score<0;}).length;
    return{total:_history.length,positive:pos,negative:neg,accuracy:_history.length?Math.round(pos/_history.length*100):0};
  }

  return{record:record,thumbsUp:thumbsUp,thumbsDown:thumbsDown,stats:stats};
})();

/* ============================================================
   5. REFLECTION ENGINE v2
      Reflection → Semantic Memory → Knowledge Graph
   ============================================================ */
var ReflectionEngineV2 = (function(){
  var _lastAnswer = "";
  var _lastQuery = "";

  function setLast(query, answer){
    _lastQuery = query;
    _lastAnswer = answer;
  }

  function reflect(answer, query){
    if(!answer||answer.length<20)return null;
    var q = query||_lastQuery;
    var a = answer||_lastAnswer;

    // Extract key insights from the answer
    var insights = _extractInsights(a, q);
    if(!insights.length)return null;

    var summary = insights.slice(0,2).join(" | ");

    // Save to MemoryV5 (reflection → semantic → KG)
    window.MemoryV5&&window.MemoryV5.addReflection(summary, q);

    // Update existing ReflectionLayer if present
    if(window.ReflectionLayer&&window.ReflectionLayer.review){
      try{window.ReflectionLayer.review(a,0.7);}catch(e){}
    }

    // Persist to MetaCognition if available
    if(window.MetaCognition&&window.MetaCognition.assess){
      try{window.MetaCognition.assess(q,{answer:a,score:0.7});}catch(e){}
    }

    return summary;
  }

  function _extractInsights(text, query){
    var insights = [];
    // Pattern 1: X คือ Y
    var m1 = text.match(/([ก-์a-zA-Z0-9][ก-์a-zA-Z0-9 ]{1,25}?)\s*(?:คือ|หมายถึง)\s*([^.\n]{5,80})/g);
    if(m1)insights = insights.concat(m1.slice(0,2));
    // Pattern 2: Numbers/facts
    var m2 = text.match(/\d+(?:\.\d+)?[%ก-์a-zA-Z ]{2,30}/g);
    if(m2&&query)insights.push(query.substring(0,30)+": "+m2[0]);
    return insights;
  }

  return{setLast:setLast,reflect:reflect};
})();

/* ============================================================
   6. BRAIN CORE — Central Hub
      All inputs flow through here. No engine called directly.
   ============================================================ */
var BrainCore = (function(){
  var _conversationCtx = []; // short-term context

  function process(query, opts){
    opts = opts||{};
    if(!query)return{intent:"unknown",answer:"",context:[]};

    // STEP 1: Classify intent
    var intent = window.IntentRouterV2
      ? window.IntentRouterV2.classify(query)
      : (window.IntentRouter?window.IntentRouter.classify(query):"knowledge");

    // STEP 2: Unified search — single pass across all memory
    var searchResults = window.MemoryV5
      ? window.MemoryV5.search(query,{topK:8,threshold:0.02})
      : (window.MemoryEngineV4?window.MemoryEngineV4.retrieve(query,{topK:5,threshold:0.02}):[]);

    // STEP 3: Update shared Working Memory (Evidence Pool)
    window.WorkingMemory&&window.WorkingMemory.update(searchResults,query);
    var context = window.WorkingMemory?window.WorkingMemory.get(5):searchResults.slice(0,5);

    // STEP 4: Route to specialized engines by intent
    var answer = "";
    var usedEngine = "neuron";

    if(intent==="plan"&&window.Planner){
      try{var plan=window.Planner.create(query);answer=_formatPlan(plan,query);usedEngine="planner";}catch(e){}
    }

    if(!answer&&(intent==="reason"||intent==="define")&&window.RuleEngine){
      try{var rr=window.RuleEngine.infer(query);if(rr&&rr.length)answer=rr.join("\n");usedEngine="rules";}catch(e){}
    }

    if(!answer&&intent==="define"&&window.KnowledgeGraph){
      try{
        var kg=window.KnowledgeGraph.search(query,3);
        if(kg&&kg.length){answer=kg.slice(0,2).join("\n");usedEngine="kg";}
      }catch(e){}
    }

    // STEP 5: NeuronEngine (with enriched context)
    if(!answer||answer.length<10){
      if(window.MMLNeuronEngine){
        try{
          var nr=window.MMLNeuronEngine.respond(query);
          if(nr&&nr.answer&&nr.score>0.15){answer=nr.answer;usedEngine="neuron";}
        }catch(e){}
      }
    }

    // STEP 6: Context injection — prepend memory hits if no strong answer
    var contextStr = context.length>0
      ? context.slice(0,3).map(function(c){return c.content;}).filter(Boolean).join("\n\n")
      : "";

    // STEP 7: MetaCognition assessment
    var meta = null;
    if(window.MetaCognition){
      try{meta=window.MetaCognition.assess(query,{answer:answer,score:0.7,engine:usedEngine});}catch(e){}
    }

    // STEP 8: Reflection — store insight to long-term
    if(answer&&answer.length>30){
      window.ReflectionEngineV2&&window.ReflectionEngineV2.setLast(query,answer);
      // Auto-reflect after each meaningful response
      setTimeout(function(){
        window.ReflectionEngineV2&&window.ReflectionEngineV2.reflect(answer,query);
      },500);
    }

    // STEP 9: Save to MemoryV5 episodic
    if(answer&&answer.length>10){
      window.MemoryV5&&window.MemoryV5.addEpisodic(query,answer,{source:"braincore",importance:0.65});
    }

    // Update conversation context
    _conversationCtx.push({q:query,a:answer,intent:intent});
    if(_conversationCtx.length>5)_conversationCtx.shift();

    return{
      intent:intent,
      answer:answer,
      context:context,
      contextStr:contextStr,
      engine:usedEngine,
      meta:meta
    };
  }

  function _formatPlan(plan,query){
    if(!plan||!plan.steps)return"";
    return plan.steps.map(function(s,i){return (i+1)+". "+s;}).join("\n");
  }

  function getConversationContext(){return _conversationCtx;}

  function stats(){
    var v5 = window.MemoryV5?window.MemoryV5.stats():{episodic:0,semantic:0,notes:0};
    var wm = window.WorkingMemory?window.WorkingMemory.get().length:0;
    var fb = window.FeedbackEngine?window.FeedbackEngine.stats():{total:0};
    var kg = window.KnowledgeGraph?{nodes:window.KnowledgeGraph.nodeCount(),edges:window.KnowledgeGraph.edgeCount()}:{nodes:0,edges:0};
    return{
      memoryV5:v5,
      workingMemory:wm,
      feedback:fb,
      knowledgeGraph:kg,
      conversationDepth:_conversationCtx.length
    };
  }

  return{process:process,stats:stats,getContext:getConversationContext};
})();

<script>
(function(){"use strict";

/* ══════════════════════════════════════════════════════════════
   PHASE 1 — BLHStorageManager (Unified facade for all storage)
   ══════════════════════════════════════════════════════════════ */
var BLHStorageManager = (function(){
  var MAIN_DB   = "BLH_V05_Main";
  var MAIN_VER  = 1;
  var STORES = {
    memory_episodic:{keyPath:"id",autoIncrement:true,indexes:[{name:"ts",keyPath:"timestamp"},{name:"imp",keyPath:"importance"}]},
    memory_semantic:{keyPath:"id",autoIncrement:true,indexes:[{name:"ts",keyPath:"timestamp"}]},
    memory_notes:   {keyPath:"id",autoIncrement:true},
    memory_reflect: {keyPath:"id",autoIncrement:true},
    profile:        {keyPath:"k"},
    settings:       {keyPath:"k"},
    tts_prefs:      {keyPath:"k"},
    knowledge:      {keyPath:"k"},
    chat_sessions:  {keyPath:"id",autoIncrement:true,indexes:[{name:"ts",keyPath:"timestamp"}]},
    chat_messages:  {keyPath:"id",autoIncrement:true,indexes:[{name:"sid",keyPath:"sessionId"},{name:"ts",keyPath:"timestamp"}]},
    backup_meta:    {keyPath:"id",autoIncrement:true}
  };
  var _db=null,_ready=false,_readyCBs=[];

  function _open(){
    if(_db)return Promise.resolve(_db);
    return new Promise(function(res,rej){
      var req=indexedDB.open(MAIN_DB,MAIN_VER);
      req.onupgradeneeded=function(e){
        var db=e.target.result;
        Object.keys(STORES).forEach(function(sName){
          if(db.objectStoreNames.contains(sName))return;
          var cfg=STORES[sName];
          var store=db.createObjectStore(sName,{keyPath:cfg.keyPath,autoIncrement:!!cfg.autoIncrement});
          (cfg.indexes||[]).forEach(function(idx){store.createIndex(idx.name,idx.keyPath,{unique:false});});
        });
      };
      req.onsuccess=function(e){_db=e.target.result;_ready=true;_readyCBs.forEach(function(cb){try{cb();}catch(e){}});_readyCBs=[];res(_db);};
      req.onerror=function(){rej(req.error);};
    });
  }

  function onReady(cb){if(_ready)cb();else _readyCBs.push(cb);}

  function put(store,obj){return _open().then(function(db){return new Promise(function(res,rej){var tx=db.transaction(store,"readwrite");var req=tx.objectStore(store).put(obj);req.onsuccess=function(){res(req.result);};req.onerror=function(){rej(req.error);};});});}
  function get(store,key){return _open().then(function(db){return new Promise(function(res,rej){var tx=db.transaction(store,"readonly");var req=tx.objectStore(store).get(key);req.onsuccess=function(){res(req.result||null);};req.onerror=function(){rej(req.error);};});});}
  function getAll(store){return _open().then(function(db){return new Promise(function(res,rej){var tx=db.transaction(store,"readonly");var req=tx.objectStore(store).getAll();req.onsuccess=function(){res(req.result||[]);};req.onerror=function(){rej(req.error);};});});}
  function del(store,key){return _open().then(function(db){return new Promise(function(res,rej){var tx=db.transaction(store,"readwrite");var req=tx.objectStore(store).delete(key);req.onsuccess=function(){res(true);};req.onerror=function(){rej(req.error);};});});}
  function clear(store){return _open().then(function(db){return new Promise(function(res,rej){var tx=db.transaction(store,"readwrite");var req=tx.objectStore(store).clear();req.onsuccess=function(){res(true);};req.onerror=function(){rej(req.error);};});});}

  function saveKV(domain,key,value){var m={profile:"profile",settings:"settings",tts:"tts_prefs",knowledge:"knowledge"};return put(m[domain]||"settings",{k:key,v:value,ts:Date.now()});}
  function loadKV(domain,key){var m={profile:"profile",settings:"settings",tts:"tts_prefs",knowledge:"knowledge"};return get(m[domain]||"settings",key).then(function(r){return r?r.v:null;});}
  function getAllKV(domain){var m={profile:"profile",settings:"settings",tts:"tts_prefs",knowledge:"knowledge"};return getAll(m[domain]||"settings").then(function(rows){var o={};rows.forEach(function(r){o[r.k]=r.v;});return o;});}

  function storageStats(){
    var names=Object.keys(STORES);
    return _open().then(function(db){
