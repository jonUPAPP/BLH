/* ══════════════════════════════════════════════════════════════
   PHASE 2 — RAM Cache System (Load-once → RAM → batchSave)
   ══════════════════════════════════════════════════════════════ */
var BLHRamCache = (function(){
  var _cache={episodic:[],semantic:[],notes:[],reflections:[],chatMessages:[],chatSessions:[]};
  var _dirty={episodic:false,semantic:false,notes:false,reflections:false,chatMessages:false,chatSessions:false};
  var _loaded=false,_saving=false,_saveTimer=null;
  var MAX_EP=500,MAX_SEM=1000;

  function load(){
    return Promise.all([
      BLHStorage.getAll("memory_episodic"),
      BLHStorage.getAll("memory_semantic"),
      BLHStorage.getAll("memory_notes"),
      BLHStorage.getAll("memory_reflect"),
      BLHStorage.getAll("chat_sessions"),
      BLHStorage.getAll("chat_messages")
    ]).then(function(r){
      _cache.episodic    =(r[0]||[]).sort(function(a,b){return b.timestamp-a.timestamp;});
      _cache.semantic    =(r[1]||[]).sort(function(a,b){return b.timestamp-a.timestamp;});
      _cache.notes       =(r[2]||[]).sort(function(a,b){return b.timestamp-a.timestamp;});
      _cache.reflections =(r[3]||[]).sort(function(a,b){return b.timestamp-a.timestamp;});
      _cache.chatSessions=(r[4]||[]).sort(function(a,b){return b.timestamp-a.timestamp;});
      _cache.chatMessages=(r[5]||[]).sort(function(a,b){return a.timestamp-b.timestamp;});
      _loaded=true;
      _startLoop();
      console.log("[BLHRamCache] Loaded — ep:"+_cache.episodic.length+" sem:"+_cache.semantic.length+" msg:"+_cache.chatMessages.length);
      return _cache;
    }).catch(function(err){console.warn("[BLHRamCache] Load failed:",err);_loaded=true;_startLoop();return _cache;});
  }

  function markDirty(type){_dirty[type]=true;_schedule();}
  function _schedule(){if(_saveTimer)return;_saveTimer=setTimeout(function(){_saveTimer=null;batchSave();},3000);}
  function _startLoop(){setInterval(function(){var d=Object.keys(_dirty).some(function(k){return _dirty[k];});if(d)batchSave();},15000);}

  function batchSave(){
    if(_saving||!_loaded)return Promise.resolve();
    _saving=true;
    var ops=[];
    function _flush(type,store,max){
      if(!_dirty[type])return;
      _dirty[type]=false;
      var arr=max?_cache[type].slice(0,max):_cache[type];
      arr.forEach(function(m){if(!m._saved){ops.push(BLHStorage.put(store,m).then(function(id){m.id=id;m._saved=true;}).catch(function(){}));}});
    }
    _flush("episodic","memory_episodic",MAX_EP);
    _flush("semantic","memory_semantic",MAX_SEM);
    _flush("notes","memory_notes",0);
    _flush("reflections","memory_reflect",0);
    _flush("chatSessions","chat_sessions",0);
    _flush("chatMessages","chat_messages",0);
    return Promise.all(ops).then(function(){_saving=false;return{saved:ops.length};}).catch(function(){_saving=false;});
  }

  function _add(type,item,max){item.timestamp=item.timestamp||Date.now();item._saved=false;_cache[type].unshift(item);if(max&&_cache[type].length>max)_cache[type]=_cache[type].slice(0,max);markDirty(type);return item;}
  function addEpisodic(item){return _add("episodic",item,MAX_EP);}
  function addSemantic(item){return _add("semantic",item,MAX_SEM);}
  function addNote(item){return _add("notes",item,0);}
  function addReflection(item){item.timestamp=item.timestamp||Date.now();item._saved=false;_cache.reflections.unshift(item);if(_cache.reflections.length>100)_cache.reflections=_cache.reflections.slice(0,100);markDirty("reflections");return item;}
  function addChatMessage(msg){msg.timestamp=msg.timestamp||Date.now();msg._saved=false;_cache.chatMessages.push(msg);markDirty("chatMessages");return msg;}
  function getChatMessages(sid,limit){var msgs=_cache.chatMessages.filter(function(m){return m.sessionId===sid;});return limit?msgs.slice(-limit):msgs;}
  function getCache(){return _cache;}
  function stats(){return{loaded:_loaded,saving:_saving,dirty:Object.assign({},_dirty),counts:{episodic:_cache.episodic.length,semantic:_cache.semantic.length,notes:_cache.notes.length,reflections:_cache.reflections.length,chatMessages:_cache.chatMessages.length,chatSessions:_cache.chatSessions.length}};}

  BLHStorage.onReady(function(){setTimeout(load,200);});
  return{load:load,batchSave:batchSave,markDirty:markDirty,addEpisodic:addEpisodic,addSemantic:addSemantic,addNote:addNote,addReflection:addReflection,addChatMessage:addChatMessage,getChatMessages:getChatMessages,getCache:getCache,stats:stats};
})();
window.BLHCache=BLHRamCache;
console.log("[BLH V0.5] BLHRamCache loaded — Load-once RAM with batchSave ✓");

/* ══════════════════════════════════════════════════════════════
   PHASE 3 — Backup Manager (Manual/Auto backup + Restore)
   ══════════════════════════════════════════════════════════════ */
var BLHBackupManager = (function(){
  var AUTO_MS=30*60*1000,MAX_BACKUPS=10,_autoTimer=null;

  function _snapshot(){
    var c=BLHRamCache.getCache();
    return BLHStorage.storageStats().then(function(stats){
      return{version:"BLH_V0.5",timestamp:Date.now(),dateStr:new Date().toISOString(),storageStats:stats,
        data:{episodic:c.episodic.slice(0,300),semantic:c.semantic.slice(0,600),notes:c.notes,reflections:c.reflections,chatSessions:c.chatSessions,chatMessages:c.chatMessages.slice(-500)}};
    });
  }

  function _saveMeta(meta){
    return BLHStorage.put("backup_meta",meta).then(function(){
      return BLHStorage.getAll("backup_meta").then(function(all){
        if(all.length>MAX_BACKUPS){all.sort(function(a,b){return a.timestamp-b.timestamp;});return Promise.all(all.slice(0,all.length-MAX_BACKUPS).map(function(b){return BLHStorage.del("backup_meta",b.id);}));}
      });
    });
  }

  function backupNow(opts){
    opts=opts||{};
    return BLHRamCache.batchSave().then(function(){return _snapshot();}).then(function(snap){
      var json=JSON.stringify(snap,null,2);
      var ts=new Date().toISOString().replace(/[:.]/g,"-");
      var fname="BLH_backup_"+ts+".json";
      if(!opts.silent){
        var blob=new Blob([json],{type:"application/json"});
        var url=URL.createObjectURL(blob);
        var a=document.createElement("a");a.href=url;a.download=fname;a.click();
        setTimeout(function(){URL.revokeObjectURL(url);},5000);
      }
      return _saveMeta({timestamp:snap.timestamp,dateStr:snap.dateStr,filename:fname,size:json.length,counts:{episodic:snap.data.episodic.length,semantic:snap.data.semantic.length,messages:snap.data.chatMessages.length}}).then(function(){return{success:true,filename:fname,size:json.length};});
    });
  }

  function exportData(){return backupNow({silent:false});}

  function restore(jsonString){
    try{
      var snap=JSON.parse(jsonString);
      if(!snap.version||!snap.data)throw new Error("Invalid BLH backup format");
      return Promise.all(["memory_episodic","memory_semantic","memory_notes","memory_reflect","chat_sessions","chat_messages"].map(function(s){return BLHStorage.clear(s);})).then(function(){
        var ops=[];
        ["episodic","semantic","notes","reflections","chatSessions","chatMessages"].forEach(function(k){
          var storeMap={episodic:"memory_episodic",semantic:"memory_semantic",notes:"memory_notes",reflections:"memory_reflect",chatSessions:"chat_sessions",chatMessages:"chat_messages"};
          (snap.data[k]||[]).forEach(function(m){ops.push(BLHStorage.put(storeMap[k],Object.assign({},m,{id:undefined})));});
        });
        return Promise.all(ops);
      }).then(function(){return BLHRamCache.load();}).then(function(){return{success:true,restored:{episodic:(snap.data.episodic||[]).length,semantic:(snap.data.semantic||[]).length,messages:(snap.data.chatMessages||[]).length}};});
    }catch(e){return Promise.resolve({success:false,error:e.message});}
  }

  function optimize(){
    var c=BLHRamCache.getCache(),before=c.semantic.length,seen={};
    c.semantic=c.semantic.filter(function(m){var k=(m.content||"").substring(0,60).toLowerCase().trim();if(seen[k])return false;seen[k]=1;return true;});
    var removed=before-c.semantic.length;BLHRamCache.markDirty("semantic");
    return{removed:removed,remaining:c.semantic.length};
  }

  function getHistory(){return BLHStorage.getAll("backup_meta").then(function(all){return all.sort(function(a,b){return b.timestamp-a.timestamp;});});}

  function startAutoBackup(){if(_autoTimer)return;_autoTimer=setInterval(function(){backupNow({silent:true}).then(function(r){console.log("[BLHBackup] Auto:",r.filename);}).catch(function(){});},AUTO_MS);console.log("[BLHBackup] Auto-backup every 30min");}
  function stopAutoBackup(){if(_autoTimer){clearInterval(_autoTimer);_autoTimer=null;}}

  startAutoBackup();
  return{backupNow:backupNow,exportData:exportData,restore:restore,optimize:optimize,getHistory:getHistory,startAutoBackup:startAutoBackup,stopAutoBackup:stopAutoBackup};
})();
window.BLHBackup=BLHBackupManager;

/* ══════════════════════════════════════════════════════════════
   PHASE 4 — Transaction Queue (Write batching → batchSave)
   ══════════════════════════════════════════════════════════════ */
var BLHWriteQueue = (function(){
  var _q=[],_flushing=false,_timer=null;
  function _sched(){if(_timer)return;_timer=setTimeout(function(){_timer=null;flush();},1500);}
  function enqueue(type,data){_q.push({type:type,data:data,ts:Date.now()});_sched();return data;}
  function flush(){
    if(_flushing||!_q.length)return Promise.resolve();
    _flushing=true;
    var batch=_q.splice(0);
    batch.forEach(function(item){
      switch(item.type){
        case "episodic":   BLHRamCache.addEpisodic(item.data); break;
        case "semantic":   BLHRamCache.addSemantic(item.data); break;
        case "note":       BLHRamCache.addNote(item.data); break;
        case "reflection": BLHRamCache.addReflection(item.data); break;
        case "chat":       BLHRamCache.addChatMessage(item.data); break;
      }
    });
    return BLHRamCache.batchSave().then(function(){_flushing=false;return{flushed:batch.length};}).catch(function(){_flushing=false;});
  }
  function addMemory(q,a,m){return enqueue("episodic",{type:"episodic",query:q||"",content:a||"",timestamp:Date.now(),importance:(m&&m.importance)||0.65,source:(m&&m.source)||"chat",accessCount:0,weight:1.0});}
  function addKnowledge(c,m){return enqueue("semantic",{type:"semantic",content:c||"",timestamp:Date.now(),importance:(m&&m.importance)||0.75,source:(m&&m.source)||"learn",key:(m&&m.key)||null,value:(m&&m.value)||null,accessCount:0,weight:1.0});}
  function addNote(c){return enqueue("note",{content:c||"",timestamp:Date.now(),weight:1.0});}
  function addReflection(c,q){return enqueue("reflection",{content:c||"",originalQuery:q||"",timestamp:Date.now()});}
  function addChat(role,text,sid){return enqueue("chat",{role:role,text:text||"",sessionId:sid||"default",timestamp:Date.now()});}
  function stats(){return{queueLength:_q.length,flushing:_flushing};}
  return{enqueue:enqueue,flush:flush,addMemory:addMemory,addKnowledge:addKnowledge,addNote:addNote,addReflection:addReflection,addChat:addChat,stats:stats};
})();
window.BLHQueue=BLHWriteQueue;

/* Patch MemoryV5 to route through WriteQueue */

   PHASE 5 — File System Access (OPFS + File System Access API)
   ══════════════════════════════════════════════════════════════ */
var BLHFileSystem = (function(){
  var _dirHandle=null;
  var _supported=("showDirectoryPicker" in window);
  var _opfsOK=!!(navigator.storage&&navigator.storage.getDirectory);

  function requestFolder(){
    if(!_supported)return Promise.resolve({success:false,reason:"not_supported"});
    return window.showDirectoryPicker({mode:"readwrite"}).then(function(h){
      _dirHandle=h;BLHStorage.saveKV("settings","blh_fs_folder",h.name).catch(function(){});
      console.log("[BLHFileSystem] Folder:",h.name);return{success:true,folderName:h.name};
    }).catch(function(e){return{success:false,reason:e.message};});
  }

  function writeFile(filename,content){
    if(!_dirHandle)return Promise.resolve({success:false,reason:"no_folder"});
    return _dirHandle.getFileHandle(filename,{create:true}).then(function(fh){return fh.createWritable();}).then(function(w){return w.write(content).then(function(){return w.close();});}).then(function(){return{success:true,filename:filename};}).catch(function(e){return{success:false,reason:e.message};});
  }

  function exportToFolder(){
    if(!_dirHandle)return requestFolder().then(function(r){if(!r.success)return r;return exportToFolder();});
    return BLHRamCache.batchSave().then(function(){
      var ts=new Date().toISOString().replace(/[:.]/g,"-");
      var fname="BLH_backup_"+ts+".json";
      var c=BLHRamCache.getCache();
      return writeFile(fname,JSON.stringify({version:"BLH_V0.5",timestamp:Date.now(),data:c},null,2));
    });
  }

  function writeOPFS(filename,content){
    if(!_opfsOK)return Promise.resolve({success:false,reason:"opfs_not_supported"});
    return navigator.storage.getDirectory().then(function(root){return root.getFileHandle(filename,{create:true}).then(function(fh){return fh.createWritable();}).then(function(w){return w.write(content).then(function(){return w.close();});}).then(function(){return{success:true,filename:filename};});}).catch(function(e){return{success:false,reason:e.message};});
  }

  function getStatus(){return{supported:_supported,opfsSupported:_opfsOK,folderSelected:!!_dirHandle,folderName:_dirHandle?_dirHandle.name:null};}
  return{requestFolder:requestFolder,writeFile:writeFile,exportToFolder:exportToFolder,writeOPFS:writeOPFS,getStatus:getStatus};
})();

var BLHChatArchive = (function(){
  var _sid=null,_meta={};

  function startSession(label){
    _sid="sess_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);
    _meta={id:_sid,label:label||("Session "+new Date().toLocaleTimeString()),timestamp:Date.now(),messageCount:0,_saved:false};
    BLHRamCache.getCache().chatSessions.unshift(_meta);
    BLHRamCache.markDirty("chatSessions");
    BLHStorage.put("chat_sessions",_meta).catch(function(){});
    return _sid;
  }

  function saveMessage(role,text,meta){
    if(!_sid)startSession();
    var msg={sessionId:_sid,role:role,text:text||"",timestamp:Date.now(),intent:(meta&&meta.intent)||null,engine:(meta&&meta.engine)||null,_saved:false};
    BLHRamCache.addChatMessage(msg);
    _meta.messageCount=(_meta.messageCount||0)+1;
    BLHRamCache.markDirty("chatSessions");
    return msg;
  }

  function getCurrentMessages(limit){
    if(!_sid)return[];
    return BLHRamCache.getChatMessages(_sid,limit||50);
  }

  function searchHistory(query,limit){
    limit=limit||20;
    var q=(query||"").toLowerCase();
    if(!q)return[];
    return BLHRamCache.getCache().chatMessages.filter(function(m){return m.text&&m.text.toLowerCase().includes(q);}).slice(-limit);
  }

  function getSessions(){return BLHRamCache.getCache().chatSessions;}
  function getSessionMessages(sid){return BLHRamCache.getChatMessages(sid);}
  function getCurrentSessionId(){return _sid;}

  /* DOM observer: auto-capture bot messages */
  function _hookDOM(){
    if(window.__BLH_CHAT_HOOKED)return;
    window.__BLH_CHAT_HOOKED=true;
    var obs=new MutationObserver(function(muts){
      muts.forEach(function(m){
        m.addedNodes.forEach(function(node){
          if(node.nodeType!==1)return;
          var md=node.querySelector?node.querySelector(".markdown-body"):null;
          if(md&&!md._cs){md._cs=true;var t=(md.innerText||md.textContent||"").trim();if(t.length>3)saveMessage("bot",t.substring(0,1000));}
        });
      });
    });
    var root=document.getElementById("root");
    if(root)obs.observe(root,{childList:true,subtree:true});
  }

  BLHStorage.onReady(function(){setTimeout(function(){startSession();_hookDOM();},1500);});
  return{startSession:startSession,saveMessage:saveMessage,getCurrentMessages:getCurrentMessages,getSessions:getSessions,getSessionMessages:getSessionMessages,searchHistory:searchHistory,getCurrentSessionId:getCurrentSessionId};
})();

var BLHVoiceEngine=(function(){

  function _toTTS(preset){
    var v=Object.assign({},_vec,preset);
    var pitch=0.9+v.pitch*0.15+v.playful*0.08-v.calm*0.05+(_emo.happiness||0.5)*0.05;
    var rate=0.8+v.speed*0.3+v.energetic*0.1-v.calm*0.05+(_emo.energy||0.4)*0.08;
    var vol=0.7+v.confidence*0.3+v.warmth*0.05;
    return{pitch:Math.max(0.5,Math.min(2.0,pitch)),rate:Math.max(0.5,Math.min(2.0,rate)),volume:Math.max(0.5,Math.min(1.0,vol))};
  }

  function _apply(){
    if(!window.TTSEngine)return;
    var t=_toTTS(PRESETS[_ctx]||PRESETS.casual);
    try{window.TTSEngine._cfgSet("pitch",t.pitch);window.TTSEngine._cfgSet("speed",t.rate);window.TTSEngine._cfgSet("volume",t.volume);}catch(e){}
  }

  function setEmotion(obj){Object.assign(_emo,obj);_apply();}
  function setContext(key){if(PRESETS[key]){_ctx=key;_apply();}}

  function detectContext(text){
    if(!text)return"casual";var t=text.toLowerCase();
    if(/เตือน|แจ้ง|ระวัง|warning|alert/.test(t))return"alert";
    if(/อธิบาย|เพราะ|หมายถึง|คือ|ดังนั้น/.test(t))return"explain";
    if(/คิด|ลอง|น่าจะ|อาจ|hmm|ไม่แน่/.test(t))return"thinking";
    if(/ดีใจ|เย้|สนุก|เก่ง|ยอด|เยี่ยม/.test(t))return"happy";
    if(/เสียใจ|ขอโทษ|ไม่ได้|ผิดพลาด/.test(t))return"sad";
    return"casual";
  }

  function speak(text,hint){
    if(!window.TTSEngine)return;
    var c=hint||detectContext(text);setContext(c);
    window.TTSEngine.speak(text);
  }

  function saveProfile(){
    BLHStorage.saveKV("settings","blh_voice_vec",JSON.stringify(_vec)).catch(function(){});
    BLHStorage.saveKV("settings","blh_voice_emo",JSON.stringify(_emo)).catch(function(){});
  }
  function loadProfile(){
    BLHStorage.loadKV("settings","blh_voice_vec").then(function(v){if(v)try{Object.assign(_vec,JSON.parse(v));}catch(e){}});
    BLHStorage.loadKV("settings","blh_voice_emo").then(function(v){if(v)try{Object.assign(_emo,JSON.parse(v));}catch(e){}});
  }

  function status(){return{vector:Object.assign({},_vec),emotionState:Object.assign({},_emo),currentContext:_ctx,contextPresets:Object.keys(PRESETS),ttsConnected:!!window.TTSEngine};}

  function _patchTTS(){
    if(!window.TTSEngine||window.__BLH_V3_PATCHED)return;
    window.__BLH_V3_PATCHED=true;
    var _orig=window.TTSEngine.speak.bind(window.TTSEngine);
    window.TTSEngine.speak=function(text){var c=detectContext(text);if(c!==_ctx){_ctx=c;_apply();}return _orig(text);};
    console.log("[BLHVoice] TTSEngine patched with VoiceVector ✓");
  }

  BLHStorage.onReady(function(){setTimeout(function(){loadProfile();_patchTTS();},1000);});

  return{speak:speak,setEmotion:setEmotion,setContext:setContext,detectContext:detectContext,
    getVector:function(){return Object.assign({},_vec);},
    setVector:function(v){Object.assign(_vec,v);saveProfile();_apply();},
    getEmotion:function(){return Object.assign({},_emo);},
    saveProfile:saveProfile,loadProfile:loadProfile,status:status,presets:PRESETS};
})();

  /* ── FAB Button ── */
  function _buildFAB(){

    fab.id="_blh_v05_fab";fab.innerHTML="🗄";fab.title="BLH V0.5 — Storage & Backup (/v05)";

    fab.onmouseleave=function(){fab.style.transform="scale(1)";};

  /* ── Patch send ── */
  function _patchSend(){
    if(window.__BLH_V05_PATCHED||!window.__BLH_APP_SEND__)return;
    window.__BLH_V05_PATCHED=true;
    var _orig=window.__BLH_APP_SEND__;
    window.__BLH_APP_SEND__=function(text){
      var q=(text||"").trim();
      var sp=q.indexOf(" ");var cmd=sp===-1?q:q.substring(0,sp);var arg=sp===-1?"":q.substring(sp+1).trim();
      if(cmd.startsWith("/")&&_handleCmd(cmd,arg))return;
      // Auto-archive user message
      if(!q.startsWith("/"))BLHChatArchive.saveMessage("user",q);
      _orig(text);
    };
    console.log("[BLH V0.5] Send patched ✓");
  }

  /* ── Boot sequence ── */
  var _initTick=setInterval(function(){if(window.__BLH_APP_SEND__){clearInterval(_initTick);_patchSend();}},300);
  document.addEventListener("DOMContentLoaded",function(){setTimeout(function(){_patchSend();_buildFAB();},1200);});
  setTimeout(function(){_patchSend();_buildFAB();},2500);

  console.log("[BLH V0.5] Dashboard loaded — /v05 /storage /backup /restore /voice /adapters /history /chat ✓");
})();
